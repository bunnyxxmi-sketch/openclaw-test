name: OtterDiary
options:
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.bunnyxxmi.otterdiary
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  OtterDiary:
    type: application
    platform: iOS
    sources:
      - path: OtterDiary
    resources:
      - path: OtterDiary/Resources
    info:
      path: OtterDiary/Resources/Info.plist
      properties:
        CFBundleDisplayName: OtterDiary
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
  OtterDiaryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OtterDiaryTests
    dependencies:
      - target: OtterDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bunnyxxmi.otterdiary.tests
